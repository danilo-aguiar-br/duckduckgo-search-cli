# .cargo/config.toml — local development aliases.
#
# Each alias is atomic (cargo has no multi-step alias). Full local pipeline:
#   cargo check-all && cargo lint && cargo fmt --check && cargo docs && cargo test-all
#
# Gates are local only (CI/CD and GitHub Actions are forbidden — see NO_CI.md).
#
# Performance note (efficiency rules): do NOT set `target-cpu=native` or force
# mold/lld here for published binaries — that would bake host CPU features into
# crates.io/source builds. Optional mold/lld goes in the *user* ~/.cargo/config.toml
# (documented in NO_CI.md). Release uses [profile.release] fat LTO in Cargo.toml.

[alias]
# Gate 1 — compilação.
check-all = "check --all-targets --all-features --locked"

# Gate 2 — lint com warnings como erro.
lint = "clippy --all-targets --all-features --locked -- -D warnings"

# Gate 4 — doc com warnings como erro (requer RUSTDOCFLAGS no shell).
docs = "doc --no-deps --all-features --locked"

# Gate 5 — toda a suíte de testes (unit + integration + doctests).
test-all = "test --all-features --locked"

# Gate 6 — cobertura textual.
cov = "llvm-cov --all-features --summary-only"

# Gate 6 (alternativo) — cobertura com relatório HTML navegável.
cov-html = "llvm-cov --all-features --html"

# Gate 9 — ensaio de publicação sem upload ao crates.io.
publish-check = "publish --dry-run --locked"

# Gate 10 — lista arquivos que entrariam no tarball.
pkg-list = "package --list"
