# deny.toml — Configuração do `cargo-deny` para supply-chain hardening.
# Três camadas: advisories (vulnerabilidades + unmaintained), licenses (SPDX permissivas),
# sources (apenas registry oficial crates.io + sem git remotes desconhecidos).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # Historical: RUSTSEC-2025-0052 (async-std unmaintained) via older chromiumoxide.
    # chromiumoxide 0.9.1 no longer pulls async-std into this lockfile; keep the id so a
    # regression re-introducing async-std does not surprise CI without an explicit review.
    "RUSTSEC-2025-0052",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "MPL-2.0",
    # CDLA-Permissive-2.0: licença permissiva (Linux Foundation) usada por `webpki-roots`
    # para distribuir a lista de raízes da Mozilla CA. Compatível com MIT/Apache-2.0.
    "CDLA-Permissive-2.0",
]

# ring clarify removed in Pass 40 — ring is no longer in the dependency tree
# (sole rustls CryptoProvider is aws-lc-rs; ADR-0021).

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
# GAP-TLS-005: never reintroduce OpenSSL / native-tls stacks (rules-rust rustls).
deny = [
    { crate = "native-tls", reason = "TLS must be rustls only (ADR-0021)" },
    { crate = "native-tls-sys", reason = "TLS must be rustls only (ADR-0021)" },
    { crate = "openssl", reason = "TLS must be rustls only (ADR-0021)" },
    { crate = "openssl-sys", reason = "TLS must be rustls only (ADR-0021)" },
    { crate = "hyper-tls", reason = "TLS must be rustls only (ADR-0021)" },
    { crate = "tokio-native-tls", reason = "TLS must be rustls only (ADR-0021)" },
]

# skip-tree: suppress ALL duplicate-version warnings rooted at these crates.
# Each entry skips the named crate AND every transitive dependency it pulls in
# that would otherwise trigger a duplicate-version error.
#
# Root cause 1 — chromiumoxide 0.9.x
#   Brings in the async-std 1.x ecosystem (async-tungstenite, async-std, …).
#   Review when chromiumoxide migrates the CDP transport off async-std.
skip-tree = [
    { crate = "chromiumoxide@0.9.1", reason = "async-std + winreg ecosystem duplicates; awaiting chromiumoxide transport migration" },

    # Root cause 2 — console-subscriber 0.4.1
    #   Pulls tonic 0.12.3 → tower 0.4.13 (while reqwest/axum already use tower 0.5).
    #   Also brings hdrhistogram 7.5.4 → base64 0.21 (while the rest of the tree uses 0.22).
    #   Review when tokio-console / console-subscriber releases a version depending on
    #   tonic 0.13+ (which requires tower 0.5+) and hdrhistogram 8+ (base64 0.22).
    { crate = "console-subscriber@0.4.1", reason = "tonic 0.12/tower 0.4/hdrhistogram/base64 0.21 duplicates; awaiting console-subscriber upgrade to tonic 0.13+" },


]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
