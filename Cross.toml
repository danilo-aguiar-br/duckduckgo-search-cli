# Cross.toml — configuração para `cross` (cross-rs/cross).
#
# Uso: `cross build --release --target <target>`
# Requisitos: Docker ou Podman no host.
#
# Cross-compile local (ex.: ARM64 Linux a partir de laptop x86_64) via container
# Debian pré-configurado. Não há pipeline CI/CD nem GitHub Actions neste repo —
# releases e builds oficiais são manuais/locais.
#
# Residual TLS: rustls + aws-lc-rs (ADR-0021), sem openssl-sys/native-tls —
# elimina a maior dor de cross-compilation (TLS nativo). Targets abaixo
# compilam sem deps OpenSSL do sistema.

[build]
# Passagem de variáveis de ambiente ao container `cross`.
# RUSTFLAGS e similares herdam do host por padrão.
pre-build = [
    # musl-tools é necessário para targets musl quando compilados fora de Alpine.
    # Só instala se o target começar com musl (no-op nos demais).
    "if echo $CROSS_TARGET | grep -q musl; then apt-get update && apt-get install -y musl-tools; fi",
]

# Targets para cross-compile local (não há matriz de release automatizada).

[target.x86_64-unknown-linux-musl]
# Build estático tier-1 — Alpine e containers mínimos.
# image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:main"  # default

[target.aarch64-unknown-linux-musl]
# ARM64 estático — Raspberry Pi 3/4, Apple Silicon via Linux VM, Graviton.

[target.aarch64-unknown-linux-gnu]
# ARM64 glibc — quando musl não for suficiente.
