# Toolchain pin — same version on every developer machine.
# Keep `channel` compatible with `rust-version` in Cargo.toml (MSRV 1.88).
# Update in lockstep with `rust-version` to avoid drift.
# Gates are local only (NO CI / NO GitHub Actions — see NO_CI.md).

[toolchain]
channel = "1.88"
components = ["rustfmt", "clippy"]
