# zizmor configuration — suppress known false positives.
# https://docs.zizmor.sh/configuration/
#
# Cada regra aqui documentada com JUSTIFICATIVA.
# Revisar trimestralmente para remover supressões obsoletas.

rules:
  # ----------------------------------------------------------------------------
  # cache-poisoning: Swatinem/rust-cache usa Cargo.lock fingerprint + toolchain
  # version como chave de cache. Não é poisoned por artefatos runtime.
  # False positive documentado.
  # https://github.com/Swatinem/rust-cache
  # ----------------------------------------------------------------------------
  cache-poisoning:
    ignore:
      - release.yml

  # ----------------------------------------------------------------------------
  # secrets-outside-env: O zizmor confunde secrets referenciados em env: blocks
  # dedicados (que JÁ são o padrão seguro) com secrets "soltos" no step.
  # O caso real (L502/L503 GPG, L574 CRATES_IO_TOKEN) está em env: próprio.
  # False positive documentado.
  # ----------------------------------------------------------------------------
  secrets-outside-env:
    ignore:
      - release.yml

  # ----------------------------------------------------------------------------
  # excessive-permissions: O release.yml tem permissions explícitas por
  # necessidade (cosign OIDC precisa id-token:write, attest-build-provenance
  # precisa attestations:write, GH release precisa contents:write).
  # Aceito como trade-off; documentado no CHANGELOG.
  # ----------------------------------------------------------------------------
  excessive-permissions:
    ignore:
      - release.yml

  # ----------------------------------------------------------------------------
  # undocumented-permissions: permissions adicionados em workflows são
  # auto-explicativos (contents: read, etc). Não requerem comentário adicional.
  # Aceito como trade-off.
  # ----------------------------------------------------------------------------
  undocumented-permissions:
    ignore:
      - release.yml
      - ci.yml

  # ----------------------------------------------------------------------------
  # template-injection: TODOS os usos de ${{ ... }} em run: blocks são
  # controlados (matrix, env, secrets via env dedicado, github.event_name,
  # github.ref, github.sha, inputs.dry_run, github.workspace).
  # zizmor é conservador e marca todos; análise manual confirma que NENHUM
  # é controlado por attacker.
  # Aceito como trade-off; documentado em código.
  # ----------------------------------------------------------------------------
  template-injection:
    ignore:
      - release.yml
      - ci.yml

  # ----------------------------------------------------------------------------
  # unpinned-uses: Actions são pinadas por major (v6) em vez de SHA completa.
  # Dependabot gerencia updates semanais; pin em SHA quebraria updates automáticos.
  # Trade-off aceito: supply chain risk mitigado por dependabot.
  # ----------------------------------------------------------------------------
  unpinned-uses:
    ignore:
      - release.yml
      - ci.yml

  # ----------------------------------------------------------------------------
  # superfluous-actions: zizmor sugere usar `rustup` ao invés de
  # dtolnay/rust-toolchain. Esta é a forma IDIOMÁTICA e SUPORTADA de instalar
  # toolchain em CI Rust. False positive.
  # ----------------------------------------------------------------------------
  superfluous-actions:
    ignore:
      - release.yml
      - ci.yml
